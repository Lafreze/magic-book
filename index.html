<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>遗失的日记</title>

    <!-- 汉字笔顺数据与动画：回信一笔一画写出来 -->
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3/dist/hanzi-writer.min.js"></script>
    <!-- 本地 OCR 兜底（未开启 AI 辨字时使用） -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&family=Ma+Shan+Zheng&family=Caveat:wght@600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --ink-user: #2a2016; /* 书写者的墨 */
        --ink-diary: #3b2a15; /* 日记回信的墨（偏褐的旧墨水） */
        --gold: #c9b183;
        --gold-dim: #8f7c58;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "Noto Serif SC", "Songti SC", serif;
        background: radial-gradient(
          1300px 900px at 50% 28%,
          #2b2117,
          #180f08 55%,
          #0a0603 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 16px;
        color: var(--gold-dim);
        overflow-x: hidden;
      }

      /* 摇曳的烛光氛围 */
      .candlelight {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          760px 520px at 50% 44%,
          rgba(255, 186, 96, 0.1),
          transparent 70%
        );
        animation: flicker 7s ease-in-out infinite;
      }

      @keyframes flicker {
        0%,
        100% {
          opacity: 0.8;
        }
        23% {
          opacity: 1;
        }
        41% {
          opacity: 0.72;
        }
        67% {
          opacity: 0.95;
        }
        82% {
          opacity: 0.68;
        }
      }

      .title {
        margin: 0 0 8px;
        font-size: 19px;
        font-weight: 300;
        letter-spacing: 16px;
        text-indent: 16px;
        color: var(--gold);
        text-shadow: 0 0 22px rgba(255, 200, 110, 0.18);
        user-select: none;
      }

      .epigraph {
        margin: 0 0 30px;
        font-size: 12px;
        font-weight: 300;
        letter-spacing: 3px;
        color: #6f5f44;
        font-style: italic;
        user-select: none;
      }

      /* ── 羊皮纸 ─────────────────────────────── */
      .sheet {
        position: relative;
        width: min(880px, 94vw);
        height: min(590px, 66vh);
        border-radius: 1.6% 2.6% 2% 3% / 3% 2.2% 3.4% 2.6%;
        background:
          radial-gradient(
            ellipse at 16% 6%,
            rgba(255, 251, 235, 0.5),
            transparent 44%
          ),
          radial-gradient(
            ellipse at 86% 92%,
            rgba(94, 66, 34, 0.3),
            transparent 56%
          ),
          radial-gradient(
            ellipse at 6% 96%,
            rgba(94, 66, 34, 0.2),
            transparent 44%
          ),
          radial-gradient(
            ellipse at 96% 4%,
            rgba(118, 86, 46, 0.16),
            transparent 40%
          ),
          linear-gradient(
            113deg,
            #ece0c0 0%,
            #e2d2aa 38%,
            #d8c496 70%,
            #ccb582 100%
          );
        box-shadow:
          inset 0 0 95px rgba(82, 56, 24, 0.36),
          inset 0 0 16px rgba(64, 42, 16, 0.28),
          0 34px 80px rgba(0, 0, 0, 0.68),
          0 4px 16px rgba(0, 0, 0, 0.5);
        transform: rotate(0.3deg);
        cursor: crosshair;
        overflow: hidden;
      }

      /* 纸张颗粒（SVG 噪点，乘法混合出纤维质感） */
      .sheet::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
        mix-blend-mode: multiply;
        opacity: 0.13;
        pointer-events: none;
        z-index: 1;
      }

      /* 岁月的水渍与阴影 */
      .sheet::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background:
          radial-gradient(
            150px 95px at 79% 16%,
            rgba(110, 78, 38, 0.09),
            transparent 70%
          ),
          radial-gradient(
            210px 150px at 12% 80%,
            rgba(110, 78, 38, 0.08),
            transparent 70%
          ),
          radial-gradient(
            95px 70px at 42% 28%,
            rgba(110, 78, 38, 0.05),
            transparent 70%
          ),
          linear-gradient(to top, rgba(60, 40, 16, 0.1), transparent 9%);
        pointer-events: none;
        z-index: 1;
      }

      /* 阅读墨迹时，纸页透出暖光 */
      .sheet.reading {
        animation: breathe 2.2s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.07) sepia(0.08);
        }
      }

      #inkCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
        z-index: 2;
      }

      /* ── 日记的回信：每个汉字按笔顺一笔一画写出 ── */
      #replyLayer {
        position: absolute;
        inset: 0;
        z-index: 3;
        padding: 50px 62px;
        pointer-events: none;
        color: var(--ink-diary);
        transition: opacity 2.2s ease;
        overflow: hidden;
      }

      /* 字格：HanziWriter 在其中绘制笔画 SVG */
      .cell {
        display: inline-block;
        width: 42px;
        height: 48px;
        vertical-align: bottom;
        position: relative;
        transform: rotate(var(--r, 0deg)) translateY(var(--y, 0px));
      }

      .cell svg {
        display: block;
        margin: 4px auto 0;
      }

      .cell.narrow {
        width: 22px;
      }

      .cell.latin {
        width: auto;
        min-width: 16px;
        padding: 0 2px;
      }

      /* 标点 / 英文兜底：手写体墨晕淡入 */
      .fade-ch {
        font-family: "Ma Shan Zheng", "Kaiti SC", "STKaiti", "KaiTi", cursive;
        font-size: 34px;
        line-height: 48px;
        display: block;
        text-align: center;
        color: var(--ink-diary);
        opacity: 0;
        animation: chFade 0.5s ease forwards;
      }

      .cell.latin .fade-ch {
        font-family: "Caveat", cursive;
        font-size: 31px;
      }

      @keyframes chFade {
        from {
          opacity: 0;
          filter: blur(4px);
        }
        to {
          opacity: 0.92;
          filter: blur(0);
        }
      }

      /* ── 页脚控制区：极简 ──────────────────── */
      .controls {
        margin-top: 26px;
        display: flex;
        align-items: center;
        gap: 30px;
        font-size: 13px;
        letter-spacing: 3px;
        user-select: none;
      }

      .act {
        background: none;
        border: none;
        padding: 5px 2px;
        font: inherit;
        letter-spacing: 4px;
        color: var(--gold-dim);
        cursor: pointer;
        border-bottom: 1px solid transparent;
        transition:
          color 0.25s ease,
          border-color 0.25s ease;
      }

      .act:hover:not(:disabled) {
        color: #e7cd93;
        border-bottom-color: rgba(231, 205, 147, 0.45);
      }
      .act:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .ai-switch {
        display: flex;
        align-items: center;
        gap: 9px;
        cursor: pointer;
        color: var(--gold-dim);
      }

      .ai-switch input {
        display: none;
      }

      .ai-switch .track {
        width: 30px;
        height: 15px;
        border-radius: 999px;
        border: 1px solid rgba(201, 177, 131, 0.4);
        position: relative;
        transition: background 0.25s ease;
      }

      .ai-switch .track::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2.5px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--gold-dim);
        transition:
          transform 0.25s ease,
          background 0.25s ease;
      }

      .ai-switch input:checked + .track {
        background: rgba(201, 177, 131, 0.22);
      }
      .ai-switch input:checked + .track::after {
        transform: translateX(14px);
        background: #e7cd93;
      }
      .ai-switch.disabled {
        opacity: 0.35;
        cursor: default;
      }

      #status {
        margin-top: 16px;
        min-height: 20px;
        font-size: 12px;
        font-weight: 300;
        letter-spacing: 2px;
        font-style: italic;
        color: #6f5f44;
        text-align: center;
        transition: opacity 0.4s ease;
        user-select: none;
      }

      @media (max-width: 640px) {
        .title {
          font-size: 16px;
          letter-spacing: 10px;
          text-indent: 10px;
        }
        .sheet {
          height: 60vh;
        }
        #replyLayer {
          padding: 30px 28px;
          font-size: 27px;
        }
        .controls {
          gap: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="candlelight"></div>

    <h1 class="title">遗失的日记</h1>
    <p class="epigraph">以墨书写。停笔片刻，它会读你。</p>

    <div class="sheet" id="sheet">
      <canvas id="inkCanvas"></canvas>
      <div id="replyLayer"></div>
    </div>

    <div class="controls">
      <button class="act" id="readBtn">阅 读</button>
      <button class="act" id="clearBtn">新的一页</button>
      <label class="ai-switch" id="aiWrap">
        <input type="checkbox" id="aiToggle" checked />
        <span class="track"></span>
        <span>AI 辨字</span>
      </label>
    </div>

    <div id="status">在纸页上写点什么……</div>

    <script>
      /* ============================================================
       流程：手写 Canvas → toDataURL → 辨字（AI 视觉 / 本地 OCR）
             → 回信（GPT / 本地兜底）→ 按笔顺一笔一画写出 → 淡去
       API Key 只在服务器端（server.py），前端只调 /api/*。
       ============================================================ */

      const sheet = document.getElementById("sheet");
      const canvas = document.getElementById("inkCanvas");
      const ctx = canvas.getContext("2d");
      const replyLayer = document.getElementById("replyLayer");
      const statusEl = document.getElementById("status");
      const readBtn = document.getElementById("readBtn");
      const clearBtn = document.getElementById("clearBtn");
      const aiToggle = document.getElementById("aiToggle");
      const aiWrap = document.getElementById("aiWrap");

      const INK_USER = "#2a2016";
      const INK_DIARY = "#3b2a15";
      const CJK = /[㐀-鿿]/;
      const NARROW = /[，。、；：！？…·—''""「」『』《》（）,.!?;:'"()]/;

      let dpr = 1;
      let strokes = [];
      let currentStroke = null;
      let lastPoint = null;
      let lastTime = 0;
      let state = "idle"; // idle | reading | replying
      let autoReadTimer = null;
      let genId = 0; // “新的一页”可打断回信
      let serverAI = false;

      const wait = (ms) => new Promise((r) => setTimeout(r, ms));
      const setStatus = (t) => {
        statusEl.textContent = t;
      };

      /* 匿名用户标识：用于服务端按用户统计 token 消耗 */
      let clientId = localStorage.getItem("clientId");
      if (!clientId) {
        clientId = crypto.randomUUID
          ? crypto.randomUUID()
          : Date.now().toString(16) + "-" + Math.random().toString(16).slice(2);
        localStorage.setItem("clientId", clientId);
      }

      const apiHeaders = {
        "Content-Type": "application/json",
        "X-Client-Id": clientId,
      };

      /* ── 画布 ── */
      function setupCanvas() {
        const rect = sheet.getBoundingClientRect();
        dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        drawStrokes();
      }

      function getPoint(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }

      canvas.addEventListener("pointerdown", (e) => {
        if (state !== "idle") return;
        e.preventDefault();
        try {
          canvas.setPointerCapture(e.pointerId);
        } catch (_) {}
        clearTimeout(autoReadTimer);
        const p = getPoint(e);
        currentStroke = { points: [{ ...p, w: 4.6 }] };
        strokes.push(currentStroke);
        lastPoint = p;
        lastTime = performance.now();
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!currentStroke) return;
        e.preventDefault();
        const p = getPoint(e);
        const now = performance.now();
        const dist = Math.hypot(p.x - lastPoint.x, p.y - lastPoint.y);
        if (dist < 1.5) return;
        const speed = dist / Math.max(now - lastTime, 1);
        const w = Math.max(2.4, Math.min(6, 6 - speed * 2.6)); // 快细慢粗，似蘸水笔
        currentStroke.points.push({ ...p, w });
        drawSegment(lastPoint, p, w);
        lastPoint = p;
        lastTime = now;
      });

      function endStroke() {
        if (!currentStroke) return;
        currentStroke = null;
        clearTimeout(autoReadTimer);
        autoReadTimer = setTimeout(readInk, 2800);
        setStatus("日记感觉到了墨水的重量……");
      }

      canvas.addEventListener("pointerup", endStroke);
      canvas.addEventListener("pointercancel", endStroke);

      function drawSegment(a, b, w) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.filter = "none";
        ctx.globalAlpha = 1;
        ctx.strokeStyle = INK_USER;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = w;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      function drawStrokes(alpha = 1, blur = 0, sink = 0) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.filter = blur > 0 ? `blur(${blur}px)` : "none";
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = INK_USER;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (const s of strokes) {
          for (let i = 1; i < s.points.length; i++) {
            const a = s.points[i - 1],
              b = s.points[i];
            ctx.lineWidth = (a.w + b.w) / 2;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y + sink);
            ctx.lineTo(b.x, b.y + sink);
            ctx.stroke();
          }
        }
        ctx.filter = "none";
        ctx.globalAlpha = 1;
      }

      /* ── 墨迹被纸页吸收 ── */
      function absorbInk(duration = 2200) {
        return new Promise((resolve) => {
          const start = performance.now();
          (function frame(now) {
            const t = Math.min(1, (now - start) / duration);
            const e = t * t * (3 - 2 * t);
            drawStrokes(1 - e, e * 7, e * 5);
            if (t < 1) requestAnimationFrame(frame);
            else {
              strokes = [];
              ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              resolve();
            }
          })(performance.now());
        });
      }

      /* ── 手写 → 图片（白底便于识别） ── */
      function snapshot() {
        const off = document.createElement("canvas");
        off.width = canvas.width;
        off.height = canvas.height;
        const octx = off.getContext("2d");
        octx.fillStyle = "#ffffff";
        octx.fillRect(0, 0, off.width, off.height);
        octx.drawImage(canvas, 0, 0);
        return off.toDataURL("image/png");
      }

      /* ── 辨字：AI 视觉优先，本地 OCR 兜底 ── */
      let workerPromise = null;
      function getWorker() {
        if (!workerPromise) {
          workerPromise = Tesseract.createWorker("chi_sim+eng", 1, {
            logger: (m) => {
              if (m.status === "recognizing text" && state === "reading")
                setStatus(
                  `它在辨认你的字迹…… ${Math.round(m.progress * 100)}%`,
                );
            },
          });
        }
        return workerPromise;
      }

      function cleanText(t) {
        return (t || "")
          .replace(/\s+/g, "")
          .replace(/[|[\]{}<>~`^_=—*#]/g, "")
          .trim();
      }

      async function recognize(image) {
        if (aiToggle.checked && serverAI) {
          const r = await fetch("/api/read", {
            method: "POST",
            headers: apiHeaders,
            body: JSON.stringify({ image }),
          });
          if (r.ok) {
            const d = await r.json();
            return cleanText(d.text);
          }
          setStatus("它的眼睛有些模糊，改用旧法辨认……");
        }
        if (typeof Tesseract === "undefined")
          throw new Error("ocr_unavailable");
        const worker = await getWorker();
        const { data } = await worker.recognize(image);
        return cleanText(data.text);
      }

      /* ── 回信：GPT 优先，本地兜底 ── */
      async function getReply(text) {
        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: apiHeaders,
            body: JSON.stringify({ text }),
          });
          if (r.ok) {
            const d = await r.json();
            if (d.reply) return d.reply;
          }
        } catch (_) {}
        return localReply(text);
      }

      function localReply(text) {
        if (!text) return "墨迹在纸上晕开了。\n写得再大一些，慢一些。";
        const pool = [
          `「${text}」……\n这个词让我的书页微微发烫。`,
          `我认得「${text}」。\n很久以前，也有人在我身上写下过它。`,
          `「${text}」。\n墨水记得的，总是比人更久。`,
          `你写下「${text}」的时候，\n笔尖停顿了一下。为什么？`,
        ];
        let h = 0;
        for (const c of text) h = (h * 31 + c.codePointAt(0)) >>> 0;
        return pool[h % pool.length];
      }

      /* ── 回信：每个汉字按笔顺一笔一画写出 ── */
      function strokeChar(cell, ch) {
        return new Promise((resolve) => {
          let settled = false;
          const finish = () => {
            if (!settled) {
              settled = true;
              resolve();
            }
          };
          try {
            const writer = HanziWriter.create(cell, ch, {
              width: 38,
              height: 38,
              padding: 1,
              showOutline: false,
              showCharacter: false,
              strokeColor: INK_DIARY,
              strokeAnimationSpeed: 3.2, // 一笔一笔的速度
              delayBetweenStrokes: 90, // 笔画之间的停顿
              onLoadCharDataError: () => {
                cell.innerHTML = "";
                fadeChar(cell, ch);
                setTimeout(finish, 300);
              },
            });
            writer.animateCharacter({ onComplete: finish });
          } catch (_) {
            cell.innerHTML = "";
            fadeChar(cell, ch);
            setTimeout(finish, 300);
          }
          setTimeout(finish, 12000); // 兜底：单字最多等 12 秒
        });
      }

      function fadeChar(cell, ch) {
        const s = document.createElement("span");
        s.className = "fade-ch";
        s.textContent = ch;
        cell.appendChild(s);
      }

      /* 标签页切到后台时浏览器会暂停笔画动画：等回到前台再继续写 */
      async function waitVisible() {
        while (document.hidden) await wait(300);
      }

      async function writeReply(text) {
        const my = genId;
        replyLayer.style.opacity = 1;
        replyLayer.innerHTML = "";
        for (const ch of text) {
          if (my !== genId) return;
          await waitVisible();
          if (my !== genId) return;
          if (ch === "\n") {
            replyLayer.appendChild(document.createElement("br"));
            await wait(300);
            continue;
          }
          if (ch === " " || ch === "　") {
            const gap = document.createElement("span");
            gap.className = "cell narrow";
            replyLayer.appendChild(gap);
            continue;
          }
          const cell = document.createElement("span");
          cell.className =
            "cell" +
            (NARROW.test(ch) ? " narrow" : !CJK.test(ch) ? " latin" : "");
          cell.style.setProperty(
            "--r",
            (Math.random() * 3 - 1.5).toFixed(1) + "deg",
          );
          cell.style.setProperty(
            "--y",
            (Math.random() * 2 - 1).toFixed(1) + "px",
          );
          replyLayer.appendChild(cell);
          if (CJK.test(ch) && window.HanziWriter) {
            await strokeChar(cell, ch); // 等这个字一笔一笔写完，再写下一个
          } else {
            fadeChar(cell, ch);
            await wait(200);
          }
          if (my !== genId) return;
          await wait(90); // 字与字之间提笔的停顿
        }
      }

      function fadeReplyLayer() {
        replyLayer.style.opacity = 0;
        return wait(2300).then(() => {
          replyLayer.innerHTML = "";
          replyLayer.style.opacity = 1;
        });
      }

      /* ── 主流程 ── */
      async function readInk() {
        if (state !== "idle" || strokes.length === 0) return;
        state = "reading";
        readBtn.disabled = true;
        clearTimeout(autoReadTimer);
        sheet.classList.add("reading");
        setStatus("它在辨认你的字迹……");

        const image = snapshot();
        let text = "";
        let failed = false;
        const [, recognized] = await Promise.all([
          absorbInk(),
          recognize(image).catch((err) => {
            console.error(err);
            failed = true;
            return "";
          }),
        ]);
        text = recognized;
        sheet.classList.remove("reading");

        let reply;
        if (failed) {
          setStatus("一层雾挡住了它的视线（识别服务不可用）。");
          reply = "今夜雾很重，\n我看不清你的字。";
        } else if (!text) {
          setStatus("它没有读出文字。");
          reply = "墨迹晕开了。\n写得再大一些，慢一些。";
        } else {
          setStatus(`它读到了：「${text}」，正提笔回信……`);
          reply = await getReply(text);
        }

        state = "replying";
        const my = genId;
        setStatus("它在回信。");
        await writeReply(reply);
        if (my === genId) {
          await wait(3200 + reply.length * 130);
          if (my === genId) await fadeReplyLayer();
        }
        if (my === genId) {
          state = "idle";
          readBtn.disabled = false;
          setStatus("字迹沉入了纸页。继续写吧……");
        }
      }

      readBtn.addEventListener("click", readInk);

      clearBtn.addEventListener("click", () => {
        if (state === "reading") return; // 吸收/识别中不可打断
        genId++;
        strokes = [];
        currentStroke = null;
        clearTimeout(autoReadTimer);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        replyLayer.innerHTML = "";
        replyLayer.style.opacity = 1;
        state = "idle";
        readBtn.disabled = false;
        setStatus("翻到了新的一页。");
      });

      /* ── AI 开关记忆 ── */
      aiToggle.checked = localStorage.getItem("aiRead") !== "0";
      aiToggle.addEventListener("change", () => {
        localStorage.setItem("aiRead", aiToggle.checked ? "1" : "0");
      });

      /* ── 启动：查询 AI 状态、记一次访问 ── */
      fetch("/api/status")
        .then((r) => r.json())
        .then((s) => {
          serverAI = !!s.ai;
          if (!serverAI) {
            aiToggle.checked = false;
            aiToggle.disabled = true;
            aiWrap.classList.add("disabled");
            aiWrap.title = "服务器未配置 API Key";
            if (typeof Tesseract !== "undefined") getWorker(); // 预热本地 OCR
          }
        })
        .catch(() => {
          serverAI = false;
          if (typeof Tesseract !== "undefined") getWorker();
        });

      fetch("/api/visit", { method: "POST" }).catch(() => {});

      window.addEventListener("resize", setupCanvas);
      setupCanvas();
    </script>
  </body>
</html>
