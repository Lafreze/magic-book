<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>墨页</title>

    <!-- 汉字笔顺数据与动画：回信一笔一画写出来 -->
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3/dist/hanzi-writer.min.js"></script>
    <!-- 本地 OCR 兜底（未开启 AI 辨字时使用） -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Caveat:wght@600&family=Klee+One:wght@600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --ink-user: #2a2016; /* 书写者的墨 */
        --ink-diary: #3b2a15; /* 日记回信的墨（偏褐的旧墨水） */
        --gold: #c9b183;
        --gold-dim: #8f7c58;
      }

      html,
      body {
        height: 100%;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        font-family:
          "Ma Shan Zheng", "Klee One", "Caveat", "Kaiti SC", "STKaiti",
          cursive;
        background: radial-gradient(
          1300px 900px at 50% 28%,
          #2b2117,
          #180f08 55%,
          #0a0603 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 22px 14px;
        color: var(--gold-dim);
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
      }

      body.writing,
      body.writing * {
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      /* 摇曳的烛光氛围 */
      .candlelight {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          760px 520px at 50% 44%,
          rgba(255, 186, 96, 0.1),
          transparent 70%
        );
        animation: flicker 7s ease-in-out infinite;
      }

      @keyframes flicker {
        0%,
        100% {
          opacity: 0.8;
        }
        23% {
          opacity: 1;
        }
        41% {
          opacity: 0.72;
        }
        67% {
          opacity: 0.95;
        }
        82% {
          opacity: 0.68;
        }
      }

      .stage {
        width: min(900px, 96vw);
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      /* ── 羊皮纸 ─────────────────────────────── */
      .sheet {
        position: relative;
        width: 100%;
        height: min(640px, 78dvh);
        border-radius: 1.6% 2.6% 2% 3% / 3% 2.2% 3.4% 2.6%;
        background:
          radial-gradient(
            ellipse at 16% 6%,
            rgba(255, 251, 235, 0.5),
            transparent 44%
          ),
          radial-gradient(
            ellipse at 86% 92%,
            rgba(94, 66, 34, 0.3),
            transparent 56%
          ),
          radial-gradient(
            ellipse at 6% 96%,
            rgba(94, 66, 34, 0.2),
            transparent 44%
          ),
          radial-gradient(
            ellipse at 96% 4%,
            rgba(118, 86, 46, 0.16),
            transparent 40%
          ),
          linear-gradient(
            113deg,
            #ece0c0 0%,
            #e2d2aa 38%,
            #d8c496 70%,
            #ccb582 100%
          );
        box-shadow:
          inset 0 0 95px rgba(82, 56, 24, 0.36),
          inset 0 0 16px rgba(64, 42, 16, 0.28),
          0 34px 80px rgba(0, 0, 0, 0.68),
          0 4px 16px rgba(0, 0, 0, 0.5);
        transform: rotate(0.3deg);
        cursor: crosshair;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
      }

      /* 纸张颗粒（SVG 噪点，乘法混合出纤维质感） */
      .sheet::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
        mix-blend-mode: multiply;
        opacity: 0.13;
        pointer-events: none;
        z-index: 1;
      }

      /* 岁月的水渍与阴影 */
      .sheet::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background:
          radial-gradient(
            150px 95px at 79% 16%,
            rgba(110, 78, 38, 0.09),
            transparent 70%
          ),
          radial-gradient(
            210px 150px at 12% 80%,
            rgba(110, 78, 38, 0.08),
            transparent 70%
          ),
          radial-gradient(
            95px 70px at 42% 28%,
            rgba(110, 78, 38, 0.05),
            transparent 70%
          ),
          linear-gradient(to top, rgba(60, 40, 16, 0.1), transparent 9%);
        pointer-events: none;
        z-index: 1;
      }

      /* 阅读墨迹时，纸页透出暖光 */
      .sheet.reading {
        animation: breathe 2.2s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.07) sepia(0.08);
        }
      }

      #inkCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
        z-index: 2;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      /* ── 日记的回信：按管理员配置显示特效 ── */
      #replyLayer {
        position: absolute;
        inset: 0;
        z-index: 3;
        padding: 50px 62px;
        pointer-events: none;
        color: var(--ink-diary);
        transition: opacity 1.4s ease;
        overflow: hidden;
      }

      /* 字格：HanziWriter 在其中绘制笔画 SVG */
      .cell {
        display: inline-block;
        width: 42px;
        height: 48px;
        vertical-align: bottom;
        position: relative;
        transform: rotate(var(--r, 0deg)) translateY(var(--y, 0px));
      }

      .cell svg {
        display: block;
        margin: 4px auto 0;
      }

      .cell.narrow {
        width: 22px;
      }

      .cell.latin {
        width: auto;
        min-width: 16px;
        padding: 0 2px;
      }

      .stroke-letter {
        display: block;
        width: var(--letter-width, 20px);
        height: 48px;
        overflow: visible;
      }

      .stroke-letter text {
        font-family: "Caveat", cursive;
        font-size: 38px;
        fill: transparent;
        stroke: var(--ink-diary);
        stroke-width: 1.25;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: var(--dash, 120);
        stroke-dashoffset: var(--dash, 120);
        animation:
          letterStroke var(--letter-duration, 320ms) ease forwards,
          letterFill var(--letter-duration, 320ms) ease forwards;
      }

      /* 标点 / 英文 / 非笔顺效果：手写体逐字显现 */
      .fade-ch {
        font-family: "Ma Shan Zheng", "Kaiti SC", "STKaiti", "KaiTi", cursive;
        font-size: 34px;
        line-height: 48px;
        display: block;
        text-align: center;
        color: var(--ink-diary);
        opacity: 0;
        animation: chFade var(--char-duration, 0.32s) ease forwards;
      }

      .cell.latin .fade-ch {
        font-family: "Caveat", cursive;
        font-size: 31px;
      }

      .fade-ch.reveal-gradient {
        background: linear-gradient(
          90deg,
          rgba(59, 42, 21, 0.12),
          rgba(59, 42, 21, 0.96),
          rgba(59, 42, 21, 0.42)
        );
        background-size: 220% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: gradientReveal var(--char-duration, 0.34s) ease forwards;
      }

      .fade-ch.reveal-ink {
        animation: inkReveal var(--char-duration, 0.42s) ease forwards;
        transform-origin: 50% 60%;
      }

      @keyframes chFade {
        from {
          opacity: 0;
          filter: blur(4px);
        }
        to {
          opacity: 0.92;
          filter: blur(0);
        }
      }

      @keyframes gradientReveal {
        from {
          opacity: 0;
          background-position: 100% 0;
          filter: blur(3px);
        }
        to {
          opacity: 0.94;
          background-position: 0 0;
          filter: blur(0);
        }
      }

      @keyframes inkReveal {
        0% {
          opacity: 0;
          filter: blur(7px);
          transform: scale(1.12);
          text-shadow: 0 0 18px rgba(59, 42, 21, 0.35);
        }
        58% {
          opacity: 0.82;
          filter: blur(2px);
          transform: scale(1.03);
        }
        100% {
          opacity: 0.95;
          filter: blur(0);
          transform: scale(1);
          text-shadow: 0 0 0 rgba(59, 42, 21, 0);
        }
      }

      @keyframes letterStroke {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes letterFill {
        78% {
          fill: transparent;
        }
        100% {
          fill: var(--ink-diary);
        }
      }

      #status {
        margin: 0;
        min-height: 20px;
        font-size: 17px;
        font-weight: 400;
        letter-spacing: 2px;
        color: #6f5f44;
        text-align: center;
        transition: opacity 0.4s ease;
        user-select: none;
      }

      @media (max-width: 640px) {
        body {
          padding: 10px;
        }
        .sheet {
          height: 82dvh;
        }
        #replyLayer {
          padding: 30px 28px;
          font-size: 27px;
        }
        #status {
          font-size: 15px;
          letter-spacing: 1px;
        }
      }
    </style>
  </head>

  <body>
    <div class="candlelight"></div>

    <main class="stage">
      <div class="sheet" id="sheet">
        <canvas id="inkCanvas"></canvas>
        <div id="replyLayer"></div>
      </div>

      <div id="status" aria-live="polite">纸页在等一滴墨。</div>
    </main>

    <script>
      /* ============================================================
       流程：手写 Canvas → toDataURL → 辨字（AI 视觉 / 本地 OCR）
             → 回信（GPT / 本地兜底）→ 按笔顺一笔一画写出 → 淡去
       API Key 只在服务器端（server.py），前端只调 /api/*。
       ============================================================ */

      const sheet = document.getElementById("sheet");
      const canvas = document.getElementById("inkCanvas");
      const ctx = canvas.getContext("2d");
      const replyLayer = document.getElementById("replyLayer");
      const statusEl = document.getElementById("status");

      const INK_USER = "#2a2016";
      const INK_DIARY = "#3b2a15";
      const CJK = /[㐀-鿿]/;
      const KANA = /[\u3040-\u30ff]/;
      const LATIN = /[A-Za-z0-9]/;
      const NARROW = /[，。、；：！？…·—''""「」『』《》（）,.!?;:'"()]/;
      const REPLY_SPEEDS = {
        normal: {
          strokeSpeed: 4.4,
          strokeDelay: 55,
          revealStep: 120,
          charPause: 45,
          newlinePause: 160,
          charDuration: 420,
          holdBase: 2600,
          holdPerChar: 85,
          fadeOut: 1800,
        },
        fast: {
          strokeSpeed: 7.2,
          strokeDelay: 22,
          revealStep: 72,
          charPause: 18,
          newlinePause: 90,
          charDuration: 300,
          holdBase: 1900,
          holdPerChar: 55,
          fadeOut: 1250,
        },
        very_fast: {
          strokeSpeed: 10,
          strokeDelay: 8,
          revealStep: 42,
          charPause: 8,
          newlinePause: 45,
          charDuration: 220,
          holdBase: 1300,
          holdPerChar: 35,
          fadeOut: 900,
        },
      };

      let dpr = 1;
      let strokes = [];
      let currentStroke = null;
      let lastPoint = null;
      let lastTime = 0;
      let state = "idle"; // idle | reading | replying
      let autoReadTimer = null;
      let genId = 0; // 清页或重新生成时打断回信
      let serverAI = false;
      let replyEffect = "stroke";
      let replySpeed = "fast";

      const wait = (ms) => new Promise((r) => setTimeout(r, ms));
      const setStatus = (t) => {
        statusEl.textContent = t;
      };

      /* 匿名用户标识：用于服务端按用户统计 token 消耗 */
      let clientId = localStorage.getItem("clientId");
      if (!clientId) {
        clientId = crypto.randomUUID
          ? crypto.randomUUID()
          : Date.now().toString(16) + "-" + Math.random().toString(16).slice(2);
        localStorage.setItem("clientId", clientId);
      }

      const apiHeaders = {
        "Content-Type": "application/json",
        "X-Client-Id": clientId,
      };

      /* ── 画布 ── */
      function setupCanvas() {
        const rect = sheet.getBoundingClientRect();
        dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        drawStrokes();
      }

      function getPoint(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }

      canvas.addEventListener("pointerdown", (e) => {
        if (state !== "idle") return;
        e.preventDefault();
        document.body.classList.add("writing");
        try {
          canvas.setPointerCapture(e.pointerId);
        } catch (_) {}
        clearTimeout(autoReadTimer);
        const p = getPoint(e);
        currentStroke = { points: [{ ...p, w: 4.6 }] };
        strokes.push(currentStroke);
        lastPoint = p;
        lastTime = performance.now();
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!currentStroke) return;
        e.preventDefault();
        const events =
          typeof e.getCoalescedEvents === "function"
            ? e.getCoalescedEvents()
            : [e];
        for (const event of events) drawPoint(getPoint(event));
      });

      function drawPoint(p) {
        const now = performance.now();
        const dist = Math.hypot(p.x - lastPoint.x, p.y - lastPoint.y);
        if (dist < 0.7) return;
        const speed = dist / Math.max(now - lastTime, 1);
        const w = Math.max(2.2, Math.min(6.4, 6.2 - speed * 2.3));
        currentStroke.points.push({ ...p, w });
        drawSegment(lastPoint, p, w);
        lastPoint = p;
        lastTime = now;
      }

      function endStroke() {
        document.body.classList.remove("writing");
        if (!currentStroke) return;
        currentStroke = null;
        clearTimeout(autoReadTimer);
        autoReadTimer = setTimeout(readInk, 2800);
        setStatus("墨还湿着，纸页正在听。");
      }

      canvas.addEventListener("pointerup", endStroke);
      canvas.addEventListener("pointercancel", endStroke);
      canvas.addEventListener("contextmenu", (e) => e.preventDefault());

      function drawSegment(a, b, w) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.filter = "none";
        ctx.globalAlpha = 1;
        ctx.strokeStyle = INK_USER;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = w;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      function drawStrokes(alpha = 1, blur = 0, sink = 0, dry = 0) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.filter = blur > 0 ? `blur(${blur}px)` : "none";
        ctx.globalAlpha = alpha;
        const r = Math.round(42 + dry * 64);
        const g = Math.round(32 + dry * 44);
        const b = Math.round(22 + dry * 30);
        ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (const s of strokes) {
          for (let i = 1; i < s.points.length; i++) {
            const a = s.points[i - 1],
              b = s.points[i];
            ctx.lineWidth = ((a.w + b.w) / 2) * (1 - dry * 0.18);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y + sink);
            ctx.lineTo(b.x, b.y + sink);
            ctx.stroke();
          }
        }
        ctx.filter = "none";
        ctx.globalAlpha = 1;
      }

      /* ── 墨迹被纸页吸收 ── */
      function absorbInk(duration = 1900) {
        return new Promise((resolve) => {
          const start = performance.now();
          (function frame(now) {
            const t = Math.min(1, (now - start) / duration);
            const e = t * t * (3 - 2 * t);
            const dry = Math.min(1, e * 1.25);
            drawStrokes(Math.max(0, 1 - e * e), e * 1.8, 0, dry);
            if (t < 1) requestAnimationFrame(frame);
            else {
              strokes = [];
              ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              resolve();
            }
          })(performance.now());
        });
      }

      /* ── 手写 → 图片（白底便于识别） ── */
      function snapshot() {
        const off = document.createElement("canvas");
        off.width = canvas.width;
        off.height = canvas.height;
        const octx = off.getContext("2d");
        octx.fillStyle = "#ffffff";
        octx.fillRect(0, 0, off.width, off.height);
        octx.drawImage(canvas, 0, 0);
        return off.toDataURL("image/png");
      }

      /* ── 辨字：AI 视觉优先，本地 OCR 兜底 ── */
      let workerPromise = null;
      function getWorker() {
        if (!workerPromise) {
          workerPromise = Tesseract.createWorker("chi_sim+eng+jpn", 1, {
            logger: (m) => {
              if (m.status === "recognizing text" && state === "reading")
                setStatus(
                  `纸页正在听墨…… ${Math.round(m.progress * 100)}%`,
                );
            },
          });
        }
        return workerPromise;
      }

      function cleanText(t) {
        return (t || "")
          .replace(/[|[\]{}<>~`^_=—*#]/g, "")
          .replace(/[ \t]+\n/g, "\n")
          .replace(/\n{3,}/g, "\n\n")
          .replace(/([\u3400-\u9fff\u3040-\u30ff])\s+(?=[\u3400-\u9fff\u3040-\u30ff])/g, "$1")
          .trim();
      }

      function detectLanguage(text) {
        if (KANA.test(text || "")) return "ja";
        const hasLatin = /[A-Za-z]/.test(text || "");
        const hasCjk = /[\u3400-\u9fff]/.test(text || "");
        if (hasLatin && !hasCjk) return "en";
        return "zh";
      }

      function normalizeRecognition(data) {
        const text = cleanText(data && data.text);
        const description = cleanText(
          (data && (data.description || data.image_context)) || "",
        );
        let type = ((data && data.type) || "").toLowerCase();
        if (!["text", "drawing", "empty"].includes(type)) {
          type = text ? "text" : description ? "drawing" : "empty";
        }
        if (text) type = "text";
        if (!text && type === "text") type = "empty";
        if (description && type === "empty") type = "drawing";
        const rawLanguage = ((data && data.language) || "").toLowerCase();
        const language = ["zh", "en", "ja"].includes(rawLanguage)
          ? rawLanguage
          : detectLanguage(text || description);
        return { type, text, description, language };
      }

      function normalizeReplyEffect(value) {
        return ["stroke", "fade", "ink"].includes(value) ? value : "stroke";
      }

      function normalizeReplySpeed(value) {
        return ["normal", "fast", "very_fast"].includes(value)
          ? value
          : "fast";
      }

      function speedProfile() {
        return REPLY_SPEEDS[replySpeed] || REPLY_SPEEDS.fast;
      }

      async function recognize(image) {
        if (serverAI) {
          const r = await fetch("/api/read", {
            method: "POST",
            headers: apiHeaders,
            body: JSON.stringify({ image }),
          });
          if (r.ok) {
            const d = await r.json();
            return normalizeRecognition(d);
          }
          setStatus("云影掠过，纸页改用自己的记忆。");
        }
        if (typeof Tesseract === "undefined")
          throw new Error("ocr_unavailable");
        const worker = await getWorker();
        const { data } = await worker.recognize(image);
        const text = cleanText(data.text);
        return {
          type: text ? "text" : "empty",
          text,
          description: "",
          language: detectLanguage(text),
        };
      }

      /* ── 回信：GPT 优先，本地兜底 ── */
      async function getReply(input) {
        const payload = {
          text: input.text || "",
          image_context: input.description || "",
          input_type: input.type || (input.text ? "text" : "drawing"),
          language: input.language || detectLanguage(input.text || input.description),
        };
        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: apiHeaders,
            body: JSON.stringify(payload),
          });
          if (r.ok) {
            const d = await r.json();
            if (d.reply) return d.reply;
          }
        } catch (_) {}
        return localReply(payload);
      }

      function localReply(input) {
        const text = input.text || "";
        const description = input.image_context || "";
        const language = input.language || detectLanguage(text || description);
        if (!text && description) {
          if (language === "en")
            return `I see ${description}.\nIt wants a name.`;
          if (language === "ja")
            return `${description}が見える。\n名を待っている。`;
          return `我看见了${description}。\n它在等一个名字。`;
        }
        if (!text) {
          if (language === "en") return "Too faint.\nPress the ink deeper.";
          if (language === "ja") return "薄すぎる。\nもう少し深く。";
          return "太淡了。\n把墨落深一点。";
        }
        if (language === "en") {
          const pool = [
            `"${text}" stays.\nUse it now.`,
            `I know "${text}".\nDo not waste it.`,
            `"${text}" is awake.\nKeep your hand steady.`,
            `Good.\n"${text}" opened something.`,
          ];
          let h = 0;
          for (const c of text) h = (h * 31 + c.codePointAt(0)) >>> 0;
          return pool[h % pool.length];
        }
        if (language === "ja") {
          const pool = [
            `「${text}」は残る。\n今使って。`,
            `「${text}」を知っている。\n無駄にしないで。`,
            `「${text}」が起きた。\n手を止めないで。`,
            `いい。\n「${text}」が何かを開けた。`,
          ];
          let h = 0;
          for (const c of text) h = (h * 31 + c.codePointAt(0)) >>> 0;
          return pool[h % pool.length];
        }
        const pool = [
          `「${text}」留下了。\n现在用它。`,
          `我认得「${text}」。\n别浪费。`,
          `「${text}」醒了。\n手别停。`,
          `很好。\n「${text}」打开了什么。`,
        ];
        let h = 0;
        for (const c of text) h = (h * 31 + c.codePointAt(0)) >>> 0;
        return pool[h % pool.length];
      }

      /* ── 回信：每个汉字按笔顺一笔一画写出 ── */
      function strokeChar(cell, ch, profile) {
        return new Promise((resolve) => {
          let settled = false;
          const finish = () => {
            if (!settled) {
              settled = true;
              resolve();
            }
          };
          try {
            const writer = HanziWriter.create(cell, ch, {
              width: 38,
              height: 38,
              padding: 1,
              showOutline: false,
              showCharacter: false,
              strokeColor: INK_DIARY,
              strokeAnimationSpeed: profile.strokeSpeed,
              delayBetweenStrokes: profile.strokeDelay,
              onLoadCharDataError: () => {
                cell.innerHTML = "";
                fadeChar(cell, ch, "ink", profile);
                setTimeout(finish, profile.charDuration);
              },
            });
            writer.animateCharacter({ onComplete: finish });
          } catch (_) {
            cell.innerHTML = "";
            fadeChar(cell, ch, "ink", profile);
            setTimeout(finish, profile.charDuration);
          }
          setTimeout(finish, 6500);
        });
      }

      function letterWidth(ch) {
        if (/[mwMW@#%]/.test(ch)) return 30;
        if (/[ilI1.,'!|]/.test(ch)) return 12;
        if (/[fjrt]/.test(ch)) return 17;
        return 22;
      }

      function strokeLatinChar(cell, ch, profile) {
        const width = letterWidth(ch);
        cell.style.width = width + "px";
        cell.style.minWidth = width + "px";
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("class", "stroke-letter");
        svg.setAttribute("viewBox", `0 0 ${width + 8} 48`);
        svg.style.setProperty("--letter-width", width + 8 + "px");
        svg.style.setProperty("--letter-duration", profile.charDuration + "ms");
        svg.style.setProperty("--dash", Math.max(80, width * 7) + "");

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", "1");
        text.setAttribute("y", "36");
        text.textContent = ch;
        svg.appendChild(text);
        cell.appendChild(svg);
        return wait(profile.charDuration);
      }

      function fadeChar(cell, ch, effect, profile) {
        const s = document.createElement("span");
        const cls =
          effect === "ink"
            ? " reveal-ink"
            : effect === "fade"
              ? " reveal-gradient"
              : "";
        s.className = "fade-ch" + cls;
        s.textContent = ch;
        s.style.setProperty("--char-duration", profile.charDuration + "ms");
        cell.appendChild(s);
      }

      /* 标签页切到后台时浏览器会暂停笔画动画：等回到前台再继续写 */
      async function waitVisible() {
        while (document.hidden) await wait(300);
      }

      async function writeReply(text) {
        const my = genId;
        const effect = normalizeReplyEffect(replyEffect);
        const profile = speedProfile();
        replyLayer.className = `effect-${effect}`;
        replyLayer.style.opacity = 1;
        replyLayer.style.transitionDuration = profile.fadeOut + "ms";
        replyLayer.innerHTML = "";
        for (const ch of text) {
          if (my !== genId) return;
          await waitVisible();
          if (my !== genId) return;
          if (ch === "\n") {
            replyLayer.appendChild(document.createElement("br"));
            await wait(profile.newlinePause);
            continue;
          }
          if (ch === " " || ch === "　") {
            const gap = document.createElement("span");
            gap.className = "cell narrow";
            replyLayer.appendChild(gap);
            continue;
          }
          const cell = document.createElement("span");
          cell.className =
            "cell" +
            (NARROW.test(ch) ? " narrow" : LATIN.test(ch) ? " latin" : "");
          cell.style.setProperty(
            "--r",
            (Math.random() * 3 - 1.5).toFixed(1) + "deg",
          );
          cell.style.setProperty(
            "--y",
            (Math.random() * 2 - 1).toFixed(1) + "px",
          );
          replyLayer.appendChild(cell);
          if (effect === "stroke" && CJK.test(ch) && window.HanziWriter) {
            await strokeChar(cell, ch, profile);
          } else if (effect === "stroke" && LATIN.test(ch)) {
            await strokeLatinChar(cell, ch, profile);
          } else {
            fadeChar(cell, ch, effect === "stroke" ? "ink" : effect, profile);
            await wait(profile.revealStep);
          }
          if (my !== genId) return;
          await wait(profile.charPause);
        }
      }

      function fadeReplyLayer() {
        const profile = speedProfile();
        replyLayer.style.transitionDuration = profile.fadeOut + "ms";
        replyLayer.style.opacity = 0;
        return wait(profile.fadeOut).then(() => {
          replyLayer.innerHTML = "";
          replyLayer.style.opacity = 1;
        });
      }

      /* ── 主流程 ── */
      async function readInk() {
        if (state !== "idle" || strokes.length === 0) return;
        state = "reading";
        clearTimeout(autoReadTimer);
        sheet.classList.add("reading");
        setStatus("纸页正辨认墨里的声音。");

        const image = snapshot();
        let recognition = normalizeRecognition({});
        let failed = false;
        const [, recognized] = await Promise.all([
          absorbInk(),
          recognize(image).catch((err) => {
            console.error(err);
            failed = true;
            return normalizeRecognition({});
          }),
        ]);
        recognition = recognized;
        sheet.classList.remove("reading");

        let reply;
        if (failed) {
          setStatus("雾压低了墨色。");
          reply = "太暗了。\n再落一笔。";
        } else if (recognition.type === "drawing" && recognition.description) {
          setStatus("线条已经开口。");
          reply = await getReply(recognition);
        } else if (!recognition.text) {
          setStatus("纸页只听见淡淡的风。");
          reply = "太淡了。\n把墨落深一点。";
        } else {
          setStatus("墨意已经成形。");
          reply = await getReply(recognition);
        }

        state = "replying";
        const my = genId;
        setStatus("回声正在长出来。");
        await writeReply(reply);
        if (my === genId) {
          const profile = speedProfile();
          await wait(profile.holdBase + reply.length * profile.holdPerChar);
          if (my === genId) await fadeReplyLayer();
        }
        if (my === genId) {
          state = "idle";
          setStatus("墨已干。下一笔可以落下。");
        }
      }

      function clearPage() {
        if (state === "reading") return; // 吸收/识别中不可打断
        genId++;
        strokes = [];
        currentStroke = null;
        document.body.classList.remove("writing");
        clearTimeout(autoReadTimer);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        replyLayer.innerHTML = "";
        replyLayer.style.opacity = 1;
        state = "idle";
        setStatus("纸页重新安静。");
      }

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") clearPage();
      });

      /* ── 启动：查询 AI 状态、记一次访问 ── */
      fetch("/api/status")
        .then((r) => r.json())
        .then((s) => {
          serverAI = !!s.ai_read;
          replyEffect = normalizeReplyEffect(s.reply_effect);
          replySpeed = normalizeReplySpeed(s.reply_speed);
          if (!serverAI && typeof Tesseract !== "undefined") getWorker();
        })
        .catch(() => {
          serverAI = false;
          if (typeof Tesseract !== "undefined") getWorker();
        });

      fetch("/api/visit", { method: "POST" }).catch(() => {});

      window.addEventListener("resize", setupCanvas);
      setupCanvas();
    </script>
  </body>
</html>
