<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>汤姆·里德尔的日记</title>

    <!-- OCR：手写图片 → 文字（需要联网加载 CDN） -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- 手写体：日记回复用 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Caveat:wght@600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        background:
          radial-gradient(
            ellipse at 30% 20%,
            rgba(255, 176, 64, 0.1),
            transparent 45%
          ),
          radial-gradient(
            ellipse at 75% 80%,
            rgba(120, 80, 255, 0.08),
            transparent 50%
          ),
          #0d0a08;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 28px 16px;
        color: #cbb98f;
      }

      .title {
        margin: 0 0 6px;
        font-size: 22px;
        letter-spacing: 6px;
        color: #d8c290;
        text-shadow: 0 0 18px rgba(255, 200, 100, 0.25);
      }

      .subtitle {
        margin: 0 0 22px;
        font-size: 13px;
        color: #8a795b;
        letter-spacing: 2px;
      }

      /* ── 日记本体 ─────────────────────────── */
      .diary {
        position: relative;
        width: min(760px, 100%);
        padding: 26px 26px 22px;
        border-radius: 10px;
        background: linear-gradient(160deg, #2f2018, #1d130d 70%);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.7),
          inset 0 0 0 1px rgba(190, 150, 90, 0.18),
          inset 0 0 40px rgba(0, 0, 0, 0.55);
      }

      /* 皮革封面上的烫金边线 */
      .diary::before {
        content: "";
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(212, 170, 96, 0.22);
        border-radius: 7px;
        pointer-events: none;
      }

      /* ── 书页 ─────────────────────────────── */
      .page {
        position: relative;
        height: 460px;
        border-radius: 4px;
        background:
          radial-gradient(
            ellipse at 20% 0%,
            rgba(255, 255, 255, 0.5),
            transparent 40%
          ),
          radial-gradient(
            ellipse at 100% 100%,
            rgba(120, 82, 40, 0.25),
            transparent 45%
          ),
          linear-gradient(135deg, #f3e6c4, #e9d5a8 55%, #dfc797);
        box-shadow:
          inset 0 0 34px rgba(112, 76, 34, 0.35),
          0 3px 0 #d9c69a,
          0 6px 0 #cbb586,
          0 10px 18px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        cursor: crosshair;
      }

      /* 纸张斑驳纹理 */
      .page::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(
            circle at 12% 30%,
            rgba(139, 98, 44, 0.05),
            transparent 9%
          ),
          radial-gradient(
            circle at 82% 14%,
            rgba(139, 98, 44, 0.05),
            transparent 11%
          ),
          radial-gradient(
            circle at 62% 80%,
            rgba(139, 98, 44, 0.04),
            transparent 13%
          ),
          radial-gradient(
            circle at 28% 92%,
            rgba(139, 98, 44, 0.04),
            transparent 10%
          );
        pointer-events: none;
      }

      #inkCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
        z-index: 2;
      }

      /* ── 日记的手写回复层 ─────────────────── */
      #replyLayer {
        position: absolute;
        inset: 0;
        z-index: 3;
        padding: 44px 52px;
        pointer-events: none;
        font-family:
          "Ma Shan Zheng", "Kaiti SC", "STKaiti", "KaiTi", "Caveat", cursive;
        font-size: 30px;
        line-height: 1.9;
        color: #232b4a; /* 蓝黑墨水 */
        white-space: pre-wrap;
        word-break: break-word;
        transition: opacity 2.4s ease;
      }

      #replyLayer.fade-out {
        opacity: 0;
      }

      #replyLayer span {
        display: inline-block;
        opacity: 0;
        transform: rotate(var(--r, 0deg));
        animation: inkAppear 0.9s ease forwards;
        animation-delay: var(--d, 0s);
      }

      /* 墨迹从晕染到清晰地"写"出来 */
      @keyframes inkAppear {
        0% {
          opacity: 0;
          filter: blur(6px);
        }
        45% {
          opacity: 0.85;
          filter: blur(2.5px);
        }
        100% {
          opacity: 1;
          filter: blur(0);
        }
      }

      /* 阅读墨迹时书页微微发光 */
      .page.reading {
        animation: pageGlow 1.8s ease infinite;
      }

      @keyframes pageGlow {
        0%,
        100% {
          box-shadow:
            inset 0 0 34px rgba(112, 76, 34, 0.35),
            0 3px 0 #d9c69a,
            0 6px 0 #cbb586,
            0 10px 18px rgba(0, 0, 0, 0.5);
        }
        50% {
          box-shadow:
            inset 0 0 60px rgba(160, 110, 40, 0.5),
            0 0 40px rgba(255, 208, 120, 0.35),
            0 3px 0 #d9c69a,
            0 6px 0 #cbb586,
            0 10px 18px rgba(0, 0, 0, 0.5);
        }
      }

      /* ── 工具区 ───────────────────────────── */
      .toolbar {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        justify-content: center;
      }

      button {
        border: 1px solid rgba(212, 170, 96, 0.35);
        border-radius: 999px;
        padding: 10px 26px;
        font-size: 14px;
        letter-spacing: 2px;
        color: #e6cf9a;
        background: linear-gradient(160deg, #3a2a1c, #241811);
        cursor: pointer;
        transition: all 0.15s ease;
      }

      button:hover:not(:disabled) {
        border-color: rgba(255, 210, 120, 0.7);
        box-shadow: 0 0 16px rgba(255, 200, 100, 0.25);
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #status {
        margin-top: 14px;
        min-height: 22px;
        font-size: 13px;
        letter-spacing: 1px;
        color: #9c885f;
        text-align: center;
      }

      @media (max-width: 640px) {
        .page {
          height: 380px;
        }
        #replyLayer {
          padding: 28px 26px;
          font-size: 24px;
        }
      }
    </style>
  </head>

  <body>
    <h1 class="title">✦ 汤 姆 · 里 德 尔 的 日 记 ✦</h1>
    <p class="subtitle">
      用鼠标或手指在书页上写字 · 停笔片刻，日记会读走你的墨迹，然后回信
    </p>

    <main class="diary">
      <div class="page" id="page">
        <canvas id="inkCanvas"></canvas>
        <div id="replyLayer"></div>
      </div>

      <div class="toolbar">
        <button id="readBtn">立即阅读</button>
        <button id="clearBtn">撕掉这页</button>
      </div>

      <div id="status">
        在书页上写点什么吧，比如：你好、火球、治疗、金币、传送……
      </div>
    </main>

    <script>
      /* ============================================================
       核心流程（和你总结的完全一致）：
       手写 Canvas → toDataURL 变图片 → Tesseract OCR 识别文字
       → 关键词生成回复 → 手写体逐字显示回复
       中间加了"墨迹被日记吸收"的擦除动画。
       ============================================================ */

      const page = document.getElementById("page");
      const canvas = document.getElementById("inkCanvas");
      const ctx = canvas.getContext("2d");
      const replyLayer = document.getElementById("replyLayer");
      const statusEl = document.getElementById("status");
      const readBtn = document.getElementById("readBtn");
      const clearBtn = document.getElementById("clearBtn");

      const INK = "#1c2440"; // 蓝黑墨水
      let dpr = 1;
      let strokes = []; // 记录全部笔画，便于做吸收动画
      let currentStroke = null;
      let lastPoint = null;
      let lastTime = 0;
      let state = "idle"; // idle | reading | replying
      let autoReadTimer = null;

      /* ── 画布尺寸 ── */
      function setupCanvas() {
        const rect = page.getBoundingClientRect();
        dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        drawStrokes();
      }

      /* ── 手写：记录笔画，带一点粗细变化，更像蘸水笔 ── */
      function getPoint(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }

      canvas.addEventListener("pointerdown", (e) => {
        if (state !== "idle") return;
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        clearTimeout(autoReadTimer);

        const p = getPoint(e);
        currentStroke = { points: [{ ...p, w: 5 }] };
        strokes.push(currentStroke);
        lastPoint = p;
        lastTime = performance.now();
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!currentStroke) return;
        e.preventDefault();

        const p = getPoint(e);
        const now = performance.now();
        const dist = Math.hypot(p.x - lastPoint.x, p.y - lastPoint.y);
        if (dist < 1.5) return;

        // 写得快线细，写得慢线粗
        const speed = dist / Math.max(now - lastTime, 1);
        const w = Math.max(2.6, Math.min(6.5, 6.5 - speed * 3));
        currentStroke.points.push({ ...p, w });

        drawSegment(lastPoint, p, w);
        lastPoint = p;
        lastTime = now;
      });

      function endStroke() {
        if (!currentStroke) return;
        currentStroke = null;
        // 停笔 2.5 秒后，日记自动开始"阅读"
        clearTimeout(autoReadTimer);
        autoReadTimer = setTimeout(readInk, 2500);
        statusEl.textContent = "日记正在注视你的字迹……（继续写可打断它）";
      }

      canvas.addEventListener("pointerup", endStroke);
      canvas.addEventListener("pointercancel", endStroke);

      function drawSegment(a, b, w) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.filter = "none";
        ctx.globalAlpha = 1;
        ctx.strokeStyle = INK;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = w;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      /* 用指定透明度 / 模糊 / 下沉量重画全部笔画（吸收动画用） */
      function drawStrokes(alpha = 1, blur = 0, sink = 0) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.filter = blur > 0 ? `blur(${blur}px)` : "none";
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = INK;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        for (const s of strokes) {
          for (let i = 1; i < s.points.length; i++) {
            const a = s.points[i - 1],
              b = s.points[i];
            ctx.lineWidth = (a.w + b.w) / 2;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y + sink);
            ctx.lineTo(b.x, b.y + sink);
            ctx.stroke();
          }
        }
        ctx.filter = "none";
        ctx.globalAlpha = 1;
      }

      /* ── 第 1 步→第 2 步：手写内容变成图片（白底，方便 OCR） ── */
      function snapshotForOCR() {
        const off = document.createElement("canvas");
        off.width = canvas.width;
        off.height = canvas.height;
        const octx = off.getContext("2d");
        octx.fillStyle = "#ffffff";
        octx.fillRect(0, 0, off.width, off.height);
        octx.drawImage(canvas, 0, 0);
        return off.toDataURL("image/png");
      }

      /* ── OCR：预加载 worker，识别更快 ── */
      let workerPromise = null;
      function getWorker() {
        if (!workerPromise) {
          workerPromise = Tesseract.createWorker("chi_sim+eng", 1, {
            logger: (m) => {
              if (m.status === "recognizing text" && state === "reading") {
                statusEl.textContent = `日记正在阅读墨迹…… ${Math.round(m.progress * 100)}%`;
              }
            },
          });
        }
        return workerPromise;
      }

      async function ocr(image) {
        const worker = await getWorker();
        const { data } = await worker.recognize(image);
        return cleanText(data.text);
      }

      function cleanText(text) {
        return (text || "")
          .replace(/\s+/g, "")
          .replace(/[|[\]{}<>~`^_=—]/g, "")
          .trim();
      }

      /* ── 擦除：墨迹晕开、下沉、被纸吸收 ── */
      function absorbInk(duration = 2000) {
        return new Promise((resolve) => {
          const start = performance.now();
          (function frame(now) {
            const t = Math.min(1, (now - start) / duration);
            const ease = t * t * (3 - 2 * t); // smoothstep
            drawStrokes(1 - ease, ease * 7, ease * 5);
            if (t < 1) {
              requestAnimationFrame(frame);
            } else {
              strokes = [];
              ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              resolve();
            }
          })(performance.now());
        });
      }

      /* ── 主流程：阅读墨迹 ── */
      async function readInk() {
        if (state !== "idle" || strokes.length === 0) return;
        state = "reading";
        readBtn.disabled = true;
        clearTimeout(autoReadTimer);
        page.classList.add("reading");
        statusEl.textContent = "日记正在阅读墨迹……";

        const image = snapshotForOCR();

        // 吸收动画和 OCR 同时进行
        let text = "";
        let ocrFailed = false;
        const [, ocrText] = await Promise.all([
          absorbInk(),
          ocr(image).catch((err) => {
            console.error(err);
            ocrFailed = true;
            return "";
          }),
        ]);
        text = ocrText;

        page.classList.remove("reading");

        let reply;
        if (ocrFailed) {
          statusEl.textContent =
            "一阵迷雾挡住了日记的视线（OCR 加载失败，请检查网络）。";
          reply = "墨迹被一阵奇怪的迷雾吞没了……\n我暂时读不到你的文字。";
        } else if (!text) {
          statusEl.textContent = "日记没有读出文字。";
          reply = "你的墨迹在纸上晕开了，\n我看不清。写大一些，慢一些。";
        } else {
          statusEl.textContent = `日记读到了：「${text}」`;
          reply = getMagicReply(text);
        }

        /* ── 手写体逐字回信，然后自己淡去 ── */
        state = "replying";
        await writeReply(reply);
        await wait(3000 + reply.length * 150); // 回信越长，停留越久
        await fadeReply();

        state = "idle";
        readBtn.disabled = false;
        statusEl.textContent = "墨迹已被吸收。继续写吧……";
      }

      /* ── 第 5 步：根据识别文字生成回复（关键词版，可换成 AI） ── */
      function getMagicReply(text) {
        const t = text.toLowerCase();

        if (text.includes("你好") || t.includes("hello") || t.includes("hi"))
          return "你好。\n我的名字是汤姆·里德尔。\n你是怎么得到我的日记的？";

        if (
          text.includes("名字") ||
          t.includes("name") ||
          text.includes("你是谁")
        )
          return "我是汤姆·马沃罗·里德尔。\n把字母重新排列，\n你会得到另一个名字……";

        if (text.includes("密室") || t.includes("chamber"))
          return "密室再次被打开了。\n与我一起，你会看到\n五十年前的那个夜晚。";

        if (text.includes("火") || t.includes("fire"))
          return "火焰回应了你的呼唤。\n小心，别把我的书页点着。";

        if (
          text.includes("治疗") ||
          text.includes("治愈") ||
          text.includes("回复") ||
          t.includes("heal")
        )
          return "温柔的光落在纸页之间。\n你的伤口正在愈合，\n疲惫也随墨迹散去。";

        if (
          text.includes("金币") ||
          text.includes("钱") ||
          text.includes("财") ||
          t.includes("gold")
        )
          return "我听见金币滚动的声音。\n但记住——\n贪婪会让宝箱长出牙齿。";

        if (
          text.includes("传送") ||
          text.includes("移动") ||
          t.includes("teleport") ||
          t.includes("move")
        )
          return "空间正在折叠。\n门已经打开，\n只是落点也许会有一点戏剧性。";

        if (
          text.includes("天气") ||
          text.includes("雨") ||
          text.includes("雪") ||
          text.includes("风")
        )
          return "天象符文亮了。\n天空会听你的，\n但它不一定完全服从。";

        return `「${text}」……\n这个咒语我未曾见过。\n告诉我更多，我在听。`;
      }

      /* ── 手写输出：逐字浮现 ── */
      function writeReply(text) {
        replyLayer.classList.remove("fade-out");
        replyLayer.innerHTML = "";

        const chars = [...text];
        const step = 0.14; // 每个字的间隔（秒）
        let idx = 0;

        for (const ch of chars) {
          if (ch === "\n") {
            replyLayer.appendChild(document.createElement("br"));
            continue;
          }
          const span = document.createElement("span");
          span.textContent = ch;
          span.style.setProperty("--d", idx * step + "s");
          span.style.setProperty(
            "--r",
            (Math.random() * 4 - 2).toFixed(1) + "deg",
          );
          replyLayer.appendChild(span);
          idx++;
        }

        return wait(idx * step * 1000 + 900);
      }

      function fadeReply() {
        replyLayer.classList.add("fade-out");
        return wait(2400).then(() => {
          replyLayer.innerHTML = "";
          replyLayer.classList.remove("fade-out");
        });
      }

      const wait = (ms) => new Promise((r) => setTimeout(r, ms));

      /* ── 按钮 ── */
      readBtn.addEventListener("click", readInk);

      clearBtn.addEventListener("click", () => {
        if (state !== "idle") return;
        clearTimeout(autoReadTimer);
        strokes = [];
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        replyLayer.innerHTML = "";
        statusEl.textContent = "换了一页新纸。写点什么吧……";
      });

      window.addEventListener("resize", setupCanvas);
      setupCanvas();

      // 页面一打开就在后台加载 OCR 引擎，第一次识别不用干等
      if (typeof Tesseract !== "undefined") getWorker();

      /* ============================================================
       想接真正的 AI 回复？把 getMagicReply 换成：

       async function getMagicReply(text) {
         const res = await fetch("/api/chat", {
           method: "POST",
           headers: { "Content-Type": "application/json" },
           body: JSON.stringify({ text })
         });
         const data = await res.json();
         return data.reply;
       }

       注意：API Key 只能放在后端，绝不能写进这个 HTML。
       ============================================================ */
    </script>
  </body>
</html>
